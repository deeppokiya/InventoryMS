<nav class="sidebar">

    <span class="sidebar-logo">📦</span>
    <span class="sidebar-title">Inventory MS</span>
  </div>

  <div class="user-info">
    <div class="user-avatar">{{ authService.getCurrentUser()?.fullName?.charAt(0) }}</div>
    <div>
      <div class="user-name">{{ authService.getCurrentUser()?.fullName }}</div>
      <div class="user-role badge" [class.admin]="authService.isAdmin()">

      </div>
    </div>
  </div>

  <ul class="nav-list">
    <li>
      <a routerLink="/dashboard" routerLinkActive="active">

      </a>

    <li>
      <a routerLink="/products" routerLinkActive="active">
        <span class="nav-icon">📋</span> Products

      <a routerLink="/products/add" routerLinkActive="active">
        <span class="nav-icon">➕</span> Add Product
      </a>

      <a routerLink="/staff" routerLinkActive="active">
        <span class="nav-icon">👥</span> Staff Management
      </a>
    </li>
    <li *ngIf="authService.isAdmin()">
      <a routerLink="/reports" routerLinkActive="active">

      </a>
    </li>

    <button class="btn-logout" (click)="logout()">
      <span>🚪</span> Logout
    </button>
